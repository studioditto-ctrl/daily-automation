name: Daily Newsletter Digest

on:
  # 매시 정각 실행 — 각 SET이 자체 발송 시간(schedule_times)을 체크
  schedule:
    - cron: "0 * * * *"

  # 수동 실행 (어드민 "지금 바로 실행" 버튼 → 시간 체크 없이 모든 활성 SET 실행)
  workflow_dispatch:

jobs:
  send-digest:
    name: Generate and Send Newsletter Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: python scripts/daily_digest.py
